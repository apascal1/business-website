<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}goosexing{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header class="site-header">
        <div class="nav-wrapper">
            <a class="brand" href="{{ url_for('home') }}">goosexing</a>

            <nav class="main-nav">
                <a href="{{ url_for('all_items') }}">All Items</a>
                <a href="{{ url_for('category_page', slug='men') }}">Men</a>
                <a href="{{ url_for('category_page', slug='women') }}">Women</a>
                <a href="{{ url_for('category_page', slug='unisex') }}">Unisex</a>
                <a href="{{ url_for('category_page', slug='clearance') }}">Clearance</a>
            </nav>
        </div>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <div class="footer-content">
            <p>Built to track inventory and guide buyers to trusted marketplaces.</p>
        </div>
    </footer>
</body>
</html>
